version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  json:
    class: automl_framework.utils.logging.JSONFormatter
  
  detailed:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(module)s - %(funcName)s:%(lineno)d - %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: json
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/automl.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
  
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/automl_errors.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
  
  api_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/api.log
    maxBytes: 10485760  # 10MB
    backupCount: 5

loggers:
  automl_framework:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  automl_framework.api:
    level: INFO
    handlers: [console, api_file]
    propagate: false
  
  automl_framework.services:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  automl_framework.monitoring:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  uvicorn:
    level: INFO
    handlers: [console, api_file]
    propagate: false
  
  uvicorn.access:
    level: INFO
    handlers: [api_file]
    propagate: false

root:
  level: WARNING
  handlers: [console, file]