apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: automl-checkpoints-pvc
  namespace: automl
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  storageClassName: shared-storage