apiVersion: apps/v1
kind: Deployment
metadata:
  name: automl-frontend
  namespace: automl
  labels:
    app: automl-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: automl-frontend
  template:
    metadata:
      labels:
        app: automl-frontend
    spec:
      containers:
      - name: frontend
        image: automl/frontend:latest
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: automl-frontend-service
  namespace: automl
spec:
  selector:
    app: automl-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: automl-ingress
  namespace: automl
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
  - hosts:
    - automl.yourdomain.com
    secretName: automl-tls
  rules:
  - host: automl.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: automl-api-service
            port:
              number: 8000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: automl-api-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: automl-frontend-service
            port:
              number: 80