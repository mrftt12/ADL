apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: automl-api-monitor
  namespace: automl
  labels:
    app: automl-api
spec:
  selector:
    matchLabels:
      app: automl-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
---
apiVersion: v1
kind: Service
metadata:
  name: automl-api-metrics
  namespace: automl
  labels:
    app: automl-api
spec:
  selector:
    app: automl-api
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: automl-api-pdb
  namespace: automl
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: automl-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: automl-api-hpa
  namespace: automl
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: automl-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80