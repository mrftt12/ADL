apiVersion: apps/v1
kind: Deployment
metadata:
  name: automl-api
  namespace: automl
  labels:
    app: automl-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: automl-api
  template:
    metadata:
      labels:
        app: automl-api
    spec:
      containers:
      - name: api
        image: automl/api:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://automl:$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
        - name: MONGODB_URL
          value: "mongodb://automl:$(MONGODB_PASSWORD)@$(MONGODB_HOST):$(MONGODB_PORT)/$(MONGODB_DATABASE)"
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/$(REDIS_DB)"
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: DATABASE_PORT
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: DATABASE_NAME
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: automl-secrets
              key: DATABASE_PASSWORD
        - name: MONGODB_HOST
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: MONGODB_HOST
        - name: MONGODB_PORT
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: MONGODB_PORT
        - name: MONGODB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: MONGODB_DATABASE
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: automl-secrets
              key: MONGODB_PASSWORD
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: REDIS_PORT
        - name: REDIS_DB
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: REDIS_DB
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: automl-secrets
              key: REDIS_PASSWORD
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: automl-config
              key: LOG_LEVEL
        volumeMounts:
        - name: data-storage
          mountPath: /app/data
        - name: logs-storage
          mountPath: /app/logs
        - name: models-storage
          mountPath: /app/models
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
      volumes:
      - name: data-storage
        persistentVolumeClaim:
          claimName: automl-data-pvc
      - name: logs-storage
        persistentVolumeClaim:
          claimName: automl-logs-pvc
      - name: models-storage
        persistentVolumeClaim:
          claimName: automl-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: automl-api-service
  namespace: automl
spec:
  selector:
    app: automl-api
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: automl-data-pvc
  namespace: automl
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: shared-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: automl-logs-pvc
  namespace: automl
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: shared-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: automl-models-pvc
  namespace: automl
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  storageClassName: shared-storage