apiVersion: v1
kind: ConfigMap
metadata:
  name: automl-config
  namespace: automl
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "automl"
  MONGODB_HOST: "mongodb-service"
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: "automl"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
---
apiVersion: v1
kind: Secret
metadata:
  name: automl-secrets
  namespace: automl
type: Opaque
data:
  # Base64 encoded values - replace with actual secrets
  DATABASE_PASSWORD: YXV0b21sX3Bhc3N3b3Jk  # automl_password
  MONGODB_PASSWORD: YXV0b21sX3Bhc3N3b3Jk   # automl_password
  REDIS_PASSWORD: YXV0b21sX3Bhc3N3b3Jk     # automl_password
  JWT_SECRET: c3VwZXJfc2VjcmV0X2p3dF9rZXk=   # super_secret_jwt_key